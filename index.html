<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Front Porch</title>
<meta name="theme-color" content="#C97D3D" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<style>
  :root {
    --bg:#f4efe4; --panel:#fffdf9; --ink:#2b2620; --ink-soft:#8a8071;
    --mine:#5c7a5e; --mine-text:#fbf8f1; --theirs:#ece2ce; --theirs-text:#2b2620;
    --accent:#c97d3d; --accent-soft:#f1d9b8; --border:#e3d8c2; --danger:#c75c4a;
    --av1:#5c7a5e;--av2:#c97d3d;--av3:#8b5fa0;--av4:#4a7c9b;--av5:#b0584f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",sans-serif;}
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--panel);}
  .screen.hidden{display:none;}

  /* AUTH */
  #screen-auth{align-items:center;justify-content:center;background:var(--bg);padding:20px;}
  .auth-card{background:var(--panel);border:1px solid var(--border);border-radius:20px;
    padding:32px 26px;width:100%;max-width:380px;box-shadow:0 12px 40px rgba(43,38,32,.1);}
  .auth-logo{text-align:center;margin-bottom:22px;}
  .lamp{width:14px;height:14px;border-radius:50%;background:var(--accent);
    margin:0 auto 12px;box-shadow:0 0 0 6px var(--accent-soft);animation:glow 2.2s ease-in-out infinite;}
  @keyframes glow{0%,100%{box-shadow:0 0 0 6px var(--accent-soft);}50%{box-shadow:0 0 0 10px var(--accent-soft);}}
  .auth-logo h1{font-family:Georgia,serif;font-size:25px;}
  .auth-logo p{font-size:13px;color:var(--ink-soft);margin-top:4px;}
  .auth-tabs{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px;}
  .auth-tab{flex:1;padding:10px;border:none;background:transparent;font-size:14px;font-weight:600;
    cursor:pointer;font-family:inherit;color:var(--ink-soft);}
  .auth-tab.active{background:var(--accent);color:#fff;}
  .form-group{margin-bottom:13px;}
  .form-group label{display:block;font-size:11.5px;font-weight:700;color:var(--ink-soft);
    margin-bottom:5px;letter-spacing:.4px;}
  .form-group input{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);
    font-size:15px;background:var(--bg);color:var(--ink);font-family:inherit;}
  .form-group input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .btn-primary{width:100%;padding:13px;border-radius:10px;border:none;background:var(--accent);
    color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;}
  .btn-primary:disabled{opacity:.6;cursor:default;}
  .auth-error{background:#fdecea;border:1px solid #f5c2bb;border-radius:8px;padding:10px 14px;
    font-size:13px;color:var(--danger);margin-bottom:14px;display:none;line-height:1.4;}

  /* HOME */
  .top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;
    border-bottom:1px solid var(--border);flex-shrink:0;background:var(--panel);}
  .top-bar .tw{display:flex;align-items:center;gap:10px;}
  .lamp-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 4px var(--accent-soft);animation:glow 2.2s ease-in-out infinite;}
  .top-bar h2{font-family:Georgia,serif;font-size:19px;}
  .top-bar .un{font-size:12px;color:var(--ink-soft);margin-top:1px;}
  .logout-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 12px;
    font-size:13px;color:var(--ink-soft);cursor:pointer;font-family:inherit;}
  #chat-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .empty-home{display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100%;color:var(--ink-soft);text-align:center;padding:40px 24px;gap:10px;}
  .empty-home .icon{font-size:46px;opacity:.4;}
  .empty-home p{font-size:15px;line-height:1.5;}
  .empty-home small{font-size:13px;opacity:.7;}
  .chat-item{display:flex;align-items:center;gap:13px;padding:13px 18px;
    border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;user-select:none;}
  .chat-item:active{background:var(--bg);}
  .av{width:48px;height:48px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
    justify-content:center;color:#fff;font-size:16px;font-weight:700;}
  .chat-info{flex:1;min-width:0;}
  .chat-name{font-weight:600;font-size:15px;}
  .chat-preview{font-size:13px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;margin-top:2px;}
  .chat-time{font-size:11.5px;color:var(--ink-soft);flex-shrink:0;}
  .fab{position:fixed;bottom:26px;right:20px;width:56px;height:56px;border-radius:50%;
    background:var(--accent);border:none;color:#fff;font-size:22px;cursor:pointer;
    box-shadow:0 4px 16px rgba(201,125,61,.4);display:flex;align-items:center;justify-content:center;z-index:10;}

  /* MODAL */
  #modal-new-chat{position:fixed;inset:0;background:rgba(43,38,32,.5);z-index:100;
    display:flex;align-items:flex-end;justify-content:center;}
  #modal-new-chat.hidden{display:none;}
  .modal-card{background:var(--panel);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:560px;}
  .modal-card h3{font-family:Georgia,serif;font-size:18px;margin-bottom:5px;}
  .modal-card p{font-size:13px;color:var(--ink-soft);margin-bottom:16px;}
  .modal-btns{display:flex;gap:10px;margin-top:6px;}
  .btn-secondary{flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);
    background:transparent;font-size:15px;cursor:pointer;font-family:inherit;color:var(--ink);}
  .modal-err{font-size:13px;color:var(--danger);margin-bottom:10px;display:none;line-height:1.4;}

  /* CHAT SCREEN */
  #screen-chat{background:var(--bg);}
  .chat-header{display:flex;align-items:center;gap:11px;padding:12px 16px;
    border-bottom:1px solid var(--border);flex-shrink:0;background:var(--panel);}
  .back-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px 4px 0;color:var(--accent);}
  .av-sm{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0;}
  .partner-name{font-weight:600;font-size:16px;flex:1;}
  .call-btn{background:var(--accent);border:none;border-radius:999px;color:#fff;
    padding:8px 13px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  #message-list{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;
    gap:7px;-webkit-overflow-scrolling:touch;}
  .msg-empty{margin:auto;text-align:center;color:var(--ink-soft);font-size:14px;}
  .msg-row{display:flex;align-items:flex-end;gap:6px;max-width:80%;}
  .msg-row.mine{align-self:flex-end;flex-direction:row-reverse;}
  .msg-row.theirs{align-self:flex-start;}
  .bubble{padding:9px 13px;border-radius:16px;font-size:14.5px;line-height:1.4;word-break:break-word;}
  .mine .bubble{background:var(--mine);color:var(--mine-text);border-bottom-right-radius:4px;}
  .theirs .bubble{background:var(--theirs);color:var(--theirs-text);border-bottom-left-radius:4px;}
  .msg-time{font-size:10px;opacity:.55;margin-top:3px;text-align:right;}
  .mine .msg-time{color:var(--mine-text);}
  #composer{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);
    flex-shrink:0;background:var(--panel);padding-bottom:calc(10px + env(safe-area-inset-bottom));}
  #msg-input{flex:1;padding:11px 14px;border-radius:999px;border:1px solid var(--border);
    font-size:14.5px;background:var(--bg);color:var(--ink);font-family:inherit;}
  #msg-input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  #send-btn{width:42px;height:42px;border-radius:50%;border:none;background:var(--mine);
    color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  #send-btn:disabled{opacity:.5;}

  /* TOAST */
  #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;
    color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;
    transition:opacity .25s;z-index:200;max-width:86%;text-align:center;}
  #toast.show{opacity:1;}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="screen" id="screen-auth">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="lamp"></div>
      <h1>Front Porch</h1>
      <p>Your circle, always open.</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Log in</button>
      <button class="auth-tab" id="tab-register">Sign up</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
    <div class="form-group" id="field-name" style="display:none">
      <label>YOUR NAME</label>
      <input type="text" id="input-name" placeholder="What should friends call you?" maxlength="32" />
    </div>
    <div class="form-group">
      <label>EMAIL</label>
      <input type="email" id="input-email" placeholder="your@email.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>PASSWORD</label>
      <input type="password" id="input-password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-primary" id="auth-submit">Log in</button>
  </div>
</div>

<!-- HOME SCREEN -->
<div class="screen hidden" id="screen-home">
  <div class="top-bar">
    <div class="tw">
      <div class="lamp-dot"></div>
      <div>
        <h2>Front Porch</h2>
        <div class="un" id="home-username"></div>
      </div>
    </div>
    <button class="logout-btn" id="logout-btn">Sign out</button>
  </div>
  <div id="chat-list"></div>
  <button class="fab" id="new-chat-btn" title="New chat">✏️</button>
</div>

<!-- MODAL: New Chat -->
<div id="modal-new-chat" class="hidden">
  <div class="modal-card">
    <h3>Start a chat</h3>
    <p>Enter your friend's Front Porch email address.</p>
    <div class="modal-err" id="modal-err"></div>
    <div class="form-group">
      <label>THEIR EMAIL</label>
      <input type="email" id="search-email" placeholder="friend@email.com" />
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn-primary" id="modal-start" style="margin-top:0;flex:1">Start chat</button>
    </div>
  </div>
</div>

<!-- CHAT SCREEN -->
<div class="screen hidden" id="screen-chat">
  <div class="chat-header">
    <button class="back-btn" id="back-btn">←</button>
    <div class="av-sm" id="chat-partner-av"></div>
    <div class="partner-name" id="chat-partner-name"></div>
    <button class="call-btn" id="call-btn">📞 Call</button>
  </div>
  <div id="message-list"></div>
  <form id="composer">
    <input type="text" id="msg-input" placeholder="Type a message…" maxlength="2000" autocomplete="off" />
    <button type="submit" id="send-btn">➤</button>
  </form>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, getDocs, collection,
  query, where, addDoc, onSnapshot, orderBy, serverTimestamp, updateDoc
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk2A9utoIlQQpBgt7ynqqEDQj_nno-hrQ",
  authDomain: "front-porch-c4349.firebaseapp.com",
  projectId: "front-porch-c4349",
  storageBucket: "front-porch-c4349.firebasestorage.app",
  messagingSenderId: "982558684038",
  appId: "1:982558684038:web:a3c9773dd3d4ebc48fb207"
};

const CALL_ROOM = "front-porch-circle-9f3k2x";
const AV_COLORS = ['#5c7a5e','#c97d3d','#8b5fa0','#4a7c9b','#b0584f'];

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let currentUser = null;
let userProfile = null;
let currentChatId = null;
let unsubMsgs = null;
let unsubChats = null;

// ── helpers ──
function initials(name){return name.trim().split(/\s+/).slice(0,2).map(p=>p[0].toUpperCase()).join('');}
function colorFor(str){let h=0;for(let i=0;i<str.length;i++)h=str.charCodeAt(i)+((h<<5)-h);return AV_COLORS[Math.abs(h)%AV_COLORS.length];}
function fmtTime(ts){if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});}
function fmtDate(ts){if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);const n=new Date();return d.toDateString()===n.toDateString()?fmtTime(ts):d.toLocaleDateString([],{month:'short',day:'numeric'});}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function scrollBot(){const el=document.getElementById('message-list');if(el)el.scrollTop=el.scrollHeight;}

// ── auth tabs ──
let tab = 'login';
function setTab(t){
  tab=t;
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-register').classList.toggle('active',t==='register');
  document.getElementById('field-name').style.display=t==='register'?'block':'none';
  document.getElementById('auth-submit').textContent=t==='login'?'Log in':'Create account';
  document.getElementById('auth-error').style.display='none';
}
document.getElementById('tab-login').onclick=()=>setTab('login');
document.getElementById('tab-register').onclick=()=>setTab('register');

// ── submit auth ──
document.getElementById('auth-submit').addEventListener('click', async()=>{
  const email=document.getElementById('input-email').value.trim().toLowerCase();
  const pass=document.getElementById('input-password').value;
  const name=document.getElementById('input-name').value.trim();
  const err=document.getElementById('auth-error');
  const btn=document.getElementById('auth-submit');
  err.style.display='none';
  if(!email||!pass){err.textContent='Please fill in all fields.';err.style.display='block';return;}
  if(tab==='register'&&!name){err.textContent='Please enter your name.';err.style.display='block';return;}
  if(pass.length<6){err.textContent='Password must be at least 6 characters.';err.style.display='block';return;}
  btn.disabled=true;btn.textContent=tab==='login'?'Logging in…':'Creating account…';
  try{
    if(tab==='register'){
      const cred=await createUserWithEmailAndPassword(auth,email,pass);
      await setDoc(doc(db,'users',cred.user.uid),{uid:cred.user.uid,name,email,createdAt:serverTimestamp()});
    }else{
      await signInWithEmailAndPassword(auth,email,pass);
    }
  }catch(e){
    const msgs={'auth/email-already-in-use':'That email is already registered — try logging in.',
      'auth/user-not-found':'Wrong email or password.','auth/wrong-password':'Wrong email or password.',
      'auth/invalid-credential':'Wrong email or password.','auth/invalid-email':'Enter a valid email address.'};
    err.textContent=msgs[e.code]||'Something went wrong. Try again.';
    err.style.display='block';btn.disabled=false;btn.textContent=tab==='login'?'Log in':'Create account';
  }
});
['input-name','input-email','input-password'].forEach(id=>{
  const el=document.getElementById(id);
  if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('auth-submit').click();});
});

// ── auth state ──
onAuthStateChanged(auth, async(user)=>{
  if(user){
    currentUser=user;
    const snap=await getDoc(doc(db,'users',user.uid));
    if(!snap.exists()){await signOut(auth);return;}
    userProfile=snap.data();
    document.getElementById('home-username').textContent=userProfile.name;
    showScreen('screen-home');
    loadChatList();
  }else{
    currentUser=null;userProfile=null;currentChatId=null;
    if(unsubChats){unsubChats();unsubChats=null;}
    if(unsubMsgs){unsubMsgs();unsubMsgs=null;}
    showScreen('screen-auth');
  }
});

document.getElementById('logout-btn').addEventListener('click',()=>signOut(auth));

// ── chat list ──
function loadChatList(){
  if(unsubChats){unsubChats();unsubChats=null;}
  const q=query(collection(db,'chats'),where('participants','array-contains',currentUser.uid));
  unsubChats=onSnapshot(q,(snap)=>{
    const chats=snap.docs.map(d=>({id:d.id,...d.data()}));
    chats.sort((a,b)=>(b.lastMessageAt?.seconds||0)-(a.lastMessageAt?.seconds||0));
    renderChatList(chats);
  });
}

function renderChatList(chats){
  const el=document.getElementById('chat-list');
  if(chats.length===0){
    el.innerHTML=`<div class="empty-home"><div class="icon">🏡</div>
      <p>No chats yet</p><small>Tap ✏️ below to start a chat with a friend</small></div>`;
    return;
  }
  el.innerHTML=chats.map(chat=>{
    const pid=chat.participants.find(u=>u!==currentUser.uid);
    const pname=chat.participantNames?.[pid]||'Unknown';
    const preview=chat.lastMessage||'Say hi 👋';
    const time=chat.lastMessageAt?fmtDate(chat.lastMessageAt):'';
    return `<div class="chat-item" data-cid="${esc(chat.id)}" data-pname="${esc(pname)}" data-pid="${esc(pid)}">
      <div class="av" style="background:${colorFor(pname)}">${esc(initials(pname))}</div>
      <div class="chat-info"><div class="chat-name">${esc(pname)}</div>
        <div class="chat-preview">${esc(preview)}</div></div>
      <div class="chat-time">${esc(time)}</div></div>`;
  }).join('');
}

document.getElementById('chat-list').addEventListener('click',e=>{
  const item=e.target.closest('.chat-item');
  if(item) openChat(item.dataset.cid,item.dataset.pname,item.dataset.pid);
});

// ── new chat modal ──
document.getElementById('new-chat-btn').addEventListener('click',()=>{
  document.getElementById('modal-new-chat').classList.remove('hidden');
  document.getElementById('search-email').value='';
  document.getElementById('modal-err').style.display='none';
  setTimeout(()=>document.getElementById('search-email').focus(),150);
});
document.getElementById('modal-cancel').addEventListener('click',()=>document.getElementById('modal-new-chat').classList.add('hidden'));
document.getElementById('modal-new-chat').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-new-chat'))document.getElementById('modal-new-chat').classList.add('hidden');
});
document.getElementById('search-email').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('modal-start').click();});

document.getElementById('modal-start').addEventListener('click',async()=>{
  const email=document.getElementById('search-email').value.trim().toLowerCase();
  const errEl=document.getElementById('modal-err');
  const btn=document.getElementById('modal-start');
  errEl.style.display='none';
  if(!email){errEl.textContent='Enter an email address.';errEl.style.display='block';return;}
  if(email===userProfile.email){errEl.textContent="That's your own email!";errEl.style.display='block';return;}
  btn.disabled=true;btn.textContent='Searching…';
  try{
    const q=query(collection(db,'users'),where('email','==',email));
    const snap=await getDocs(q);
    if(snap.empty){
      errEl.textContent='No Front Porch account found with that email. Make sure your friend has signed up first.';
      errEl.style.display='block';btn.disabled=false;btn.textContent='Start chat';return;
    }
    const partner=snap.docs[0].data();
    const chatId=[currentUser.uid,partner.uid].sort().join('_');
    const chatRef=doc(db,'chats',chatId);
    const chatSnap=await getDoc(chatRef);
    if(!chatSnap.exists()){
      await setDoc(chatRef,{
        participants:[currentUser.uid,partner.uid],
        participantNames:{[currentUser.uid]:userProfile.name,[partner.uid]:partner.name},
        lastMessage:'',lastMessageAt:serverTimestamp(),createdAt:serverTimestamp()
      });
    }
    document.getElementById('modal-new-chat').classList.add('hidden');
    openChat(chatId,partner.name,partner.uid);
  }catch(e){
    errEl.textContent='Something went wrong. Try again.';errEl.style.display='block';
    btn.disabled=false;btn.textContent='Start chat';
  }
});

// ── open chat ──
function openChat(chatId,partnerName,partnerUid){
  currentChatId=chatId;
  document.getElementById('chat-partner-name').textContent=partnerName;
  const av=document.getElementById('chat-partner-av');
  av.style.background=colorFor(partnerName);av.textContent=initials(partnerName);
  showScreen('screen-chat');
  if(unsubMsgs){unsubMsgs();unsubMsgs=null;}
  const q=query(collection(db,'chats',chatId,'messages'),orderBy('createdAt','asc'));
  unsubMsgs=onSnapshot(q,snap=>{
    renderMessages(snap.docs.map(d=>d.data()));
  });
  setTimeout(()=>document.getElementById('msg-input').focus(),200);
}

function renderMessages(msgs){
  const el=document.getElementById('message-list');
  const wasBot=el.scrollTop+el.clientHeight>=el.scrollHeight-70;
  if(msgs.length===0){el.innerHTML='<div class="msg-empty">No messages yet — say hi 👋</div>';return;}
  el.innerHTML=msgs.map(m=>{
    const mine=m.sender===currentUser.uid;
    return `<div class="msg-row ${mine?'mine':'theirs'}"><div class="bubble">
      <div>${esc(m.text)}</div><div class="msg-time">${fmtTime(m.createdAt)}</div></div></div>`;
  }).join('');
  if(wasBot)scrollBot();
}

// ── send message ──
document.getElementById('composer').addEventListener('submit',async e=>{
  e.preventDefault();
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  if(!text||!currentChatId)return;
  input.value='';
  document.getElementById('send-btn').disabled=true;
  try{
    const ts=serverTimestamp();
    await addDoc(collection(db,'chats',currentChatId,'messages'),{sender:currentUser.uid,senderName:userProfile.name,text,createdAt:ts});
    await updateDoc(doc(db,'chats',currentChatId),{lastMessage:text,lastMessageAt:ts});
    scrollBot();
  }catch(e){toast("Couldn't send — check your connection.");}
  finally{document.getElementById('send-btn').disabled=false;document.getElementById('msg-input').focus();}
});

// ── back + call ──
document.getElementById('back-btn').addEventListener('click',()=>{
  if(unsubMsgs){unsubMsgs();unsubMsgs=null;}
  currentChatId=null;showScreen('screen-home');
});
document.getElementById('call-btn').addEventListener('click',()=>window.open('https://meet.jit.si/'+CALL_ROOM,'_blank','noopener'));

// ── service worker ──
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));
</script>
</body>
