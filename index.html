<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Front Porch</title>
<meta name="theme-color" content="#C97D3D" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<link rel="icon" href="./icon-192.png" />
<style>
  :root {
    --bg: #f4efe4;
    --panel: #fffdf9;
    --ink: #2b2620;
    --ink-soft: #8a8071;
    --mine: #5c7a5e;
    --mine-text: #fbf8f1;
    --theirs: #ece2ce;
    --theirs-text: #2b2620;
    --accent: #c97d3d;
    --accent-soft: #f1d9b8;
    --border: #e3d8c2;
    --danger: #c75c4a;
    --avatar-1: #5c7a5e; --avatar-2: #c97d3d; --avatar-3: #8b5fa0; --avatar-4: #4a7c9b; --avatar-5: #b0584f;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #root { height: 100vh; height: 100dvh; width: 100%; display: flex; align-items: center; justify-content: center; }

  .gate { background: var(--panel); border: 1px solid var(--border); border-radius: 18px; padding: 40px 32px;
    max-width: 360px; width: 90%; text-align: center; box-shadow: 0 12px 32px rgba(43,38,32,0.08); }
  .gate .lamp { width: 14px; height: 14px; border-radius: 50%; background: var(--accent); margin: 0 auto 18px;
    box-shadow: 0 0 0 6px var(--accent-soft); animation: glow 2.2s ease-in-out infinite; }
  @keyframes glow { 0%,100%{box-shadow:0 0 0 6px var(--accent-soft);} 50%{box-shadow:0 0 0 10px var(--accent-soft);} }
  .gate h1 { font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif; font-size: 28px; margin: 0 0 6px; }
  .gate p { color: var(--ink-soft); font-size: 14px; margin: 0 0 24px; line-height: 1.5; }
  .gate input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border);
    font-size: 15px; margin-bottom: 12px; background: var(--bg); color: var(--ink); font-family: inherit; }
  .gate input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .gate button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--accent);
    color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .gate button:disabled { opacity: 0.6; }
  .gate .setup-warning { background: var(--accent-soft); border-radius: 10px; padding: 12px; font-size: 12.5px;
    text-align: left; line-height: 1.5; margin-bottom: 18px; color: var(--ink); }

  #app { display: none; flex-direction: column; height: 100%; width: 100%; max-width: 560px; margin: 0 auto;
    background: var(--panel); }
  header.bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px;
    border-bottom: 1px solid var(--border); flex-shrink: 0; }
  header.bar .title-wrap { display: flex; align-items: center; gap: 10px; }
  header.bar .lamp-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft); animation: glow 2.2s ease-in-out infinite; }
  header.bar h2 { font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif; font-size: 19px; margin: 0; }
  header.bar .sub { font-size: 12px; color: var(--ink-soft); margin-top: 1px; }
  .call-btn { display: flex; align-items: center; gap: 6px; background: var(--accent); color: #fff; border: none;
    padding: 9px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }

  #message-list { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
  .empty-state, .loading-state { margin: auto; text-align: center; color: var(--ink-soft); font-size: 14px; max-width: 220px; line-height: 1.5; }

  .msg-row { display: flex; align-items: flex-end; gap: 8px; max-width: 86%; }
  .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.theirs { align-self: flex-start; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .bubble { padding: 9px 13px; border-radius: 16px; font-size: 14.5px; line-height: 1.4; word-break: break-word; }
  .mine .bubble { background: var(--mine); color: var(--mine-text); border-bottom-right-radius: 4px; }
  .theirs .bubble { background: var(--theirs); color: var(--theirs-text); border-bottom-left-radius: 4px; }
  .sender-name { font-size: 11.5px; font-weight: 700; opacity: 0.65; margin-bottom: 2px; }
  .msg-time { font-size: 10px; opacity: 0.55; margin-top: 3px; text-align: right; }

  form#composer { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
    padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
  #msg-input { flex: 1; padding: 11px 14px; border-radius: 999px; border: 1px solid var(--border); font-size: 14.5px;
    background: var(--bg); color: var(--ink); font-family: inherit; }
  #msg-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  #send-btn { background: var(--mine); color: #fff; border: none; width: 42px; height: 42px; border-radius: 50%;
    cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  #send-btn:disabled { opacity: 0.5; }

  .toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%); background: var(--danger);
    color: #fff; padding: 9px 16px; border-radius: 10px; font-size: 13px; opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease; max-width: 80%; text-align: center; z-index: 50; }
  .toast.show { opacity: 1; }

  @media (prefers-reduced-motion: reduce) { .lamp, .lamp-dot { animation: none; } }
</style>
</head>
<body>
<div id="root">
  <div class="gate" id="name-gate">
    <div class="lamp"></div>
    <h1>Front Porch</h1>
    <div id="setup-warning" class="setup-warning" style="display:none;"></div>
    <p>A small chat just for your circle.<br/>What should people call you?</p>
    <input id="name-input" type="text" maxlength="24" placeholder="Your name" autocomplete="off" />
    <button id="name-submit">Pull up a chair</button>
  </div>

  <div id="app">
    <header class="bar">
      <div class="title-wrap">
        <div class="lamp-dot"></div>
        <div>
          <h2>Front Porch</h2>
          <div class="sub" id="me-label"></div>
        </div>
      </div>
      <button class="call-btn" id="call-btn" type="button">📞 Start call</button>
    </header>
    <div id="message-list"><div class="loading-state">Loading messages…</div></div>
    <form id="composer">
      <input id="msg-input" type="text" maxlength="2000" placeholder="Say something…" autocomplete="off" />
      <button id="send-btn" type="submit" aria-label="Send">➤</button>
    </form>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  // ⚠️ PASTE YOUR FIREBASE CONFIG HERE — replace the object below with the one
  // Firebase gave you when you registered the web app.
  const firebaseConfig = {
    apiKey: "AIzaSyCk2A9utoIlQQpBgt7ynqqEDQj_nno-hrQ",
    authDomain: "front-porch-c4349.firebaseapp.com",
    projectId: "front-porch-c4349",
    storageBucket: "front-porch-c4349.firebasestorage.app",
    messagingSenderId: "982558684038",
    appId: "1:982558684038:web:a3c9773dd3d4ebc48fb207"
  };

  const CALL_ROOM = "front-porch-circle-9f3k2x";
  const AVATAR_COLORS = ['var(--avatar-1)','var(--avatar-2)','var(--avatar-3)','var(--avatar-4)','var(--avatar-5)'];

  const nameGate = document.getElementById('name-gate');
  const setupWarning = document.getElementById('setup-warning');
  const appEl = document.getElementById('app');
  const nameInput = document.getElementById('name-input');
  const nameSubmit = document.getElementById('name-submit');
  const meLabel = document.getElementById('me-label');
  const listEl = document.getElementById('message-list');
  const composer = document.getElementById('composer');
  const msgInput = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const callBtn = document.getElementById('call-btn');
  const toastEl = document.getElementById('toast');

  const isConfigured = !Object.values(firebaseConfig).some((v) => String(v).startsWith('PASTE_'));

  if (!isConfigured) {
    setupWarning.style.display = 'block';
    setupWarning.textContent = "Setup not finished yet — the Firebase config still needs to be added to this file. Send your config to Claude to finish wiring it up.";
    nameInput.disabled = true;
    nameSubmit.disabled = true;
  }

  let myName = localStorage.getItem('front-porch-name') || null;
  let db, auth;

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
  function getInitials(name) {
    return name.trim().split(/\s+/).slice(0, 2).map((p) => p[0].toUpperCase()).join('');
  }
  function colorForName(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
  }
  function formatTime(ts) {
    if (!ts) return '…';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }
  function showToast(text) {
    toastEl.textContent = text;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 3200);
  }
  function scrollToBottom() {
    listEl.scrollTop = listEl.scrollHeight;
  }

  function renderMessages(messages) {
    if (messages.length === 0) {
      listEl.innerHTML = '<div class="empty-state">No messages yet — say hi 👋</div>';
      return;
    }
    const wasAtBottom = listEl.scrollTop + listEl.clientHeight >= listEl.scrollHeight - 60;
    listEl.innerHTML = messages.map((m) => {
      const mine = m.sender === myName;
      const row = mine ? 'mine' : 'theirs';
      const avatar = mine ? '' : `<div class="avatar" style="background:${colorForName(m.sender)}">${escapeHtml(getInitials(m.sender))}</div>`;
      const senderLine = mine ? '' : `<div class="sender-name">${escapeHtml(m.sender)}</div>`;
      return `<div class="msg-row ${row}">${avatar}<div class="bubble">${senderLine}<div class="msg-text">${escapeHtml(m.text)}</div><div class="msg-time">${formatTime(m.createdAt)}</div></div></div>`;
    }).join('');
    if (wasAtBottom) scrollToBottom();
  }

  async function enterApp() {
    nameGate.style.display = 'none';
    appEl.style.display = 'flex';
    meLabel.textContent = 'you\u2019re ' + myName;

    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) signInAnonymously(auth).catch(() => showToast('Could not connect — check your internet connection.'));
    });

    const q = query(collection(db, 'messages'), orderBy('createdAt', 'asc'));
    onSnapshot(q, (snap) => {
      const messages = snap.docs.map((d) => d.data());
      renderMessages(messages);
    }, () => {
      showToast('Lost connection to the chat — trying to reconnect…');
    });

    msgInput.focus();
  }

  nameSubmit.addEventListener('click', () => {
    const val = nameInput.value.trim();
    if (!val) { nameInput.focus(); return; }
    myName = val;
    localStorage.setItem('front-porch-name', myName);
    enterApp();
  });
  nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') nameSubmit.click(); });

  composer.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = msgInput.value.trim();
    if (!text) return;
    msgInput.value = '';
    sendBtn.disabled = true;
    try {
      await addDoc(collection(db, 'messages'), { sender: myName, text, createdAt: serverTimestamp() });
    } catch (err) {
      showToast('Message didn\u2019t send — check your connection and try again.');
    } finally {
      sendBtn.disabled = false;
      msgInput.focus();
    }
  });

  callBtn.addEventListener('click', () => {
    window.open('https://meet.jit.si/' + CALL_ROOM, '_blank', 'noopener');
  });

  if (myName && isConfigured) enterApp();
  else nameInput.focus();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    });
  }
</script>
</body>
</html>
